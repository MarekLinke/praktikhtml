<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form id="zooKeeperForm" action="processAplication.cgi">
        <p><i>Please complite the form</i><em>*</em></p>
        <fieldset>
            <legend>Contact Details</legend>
            <label for="name">Name <em>*</em></label>
            <input id="name"><br>
            <label for="telephone">Telephon <em>*</em></label>
            <input id="telephone"><br>
            <label for="email">Email <em>*</em></label>
            <input id="email" name="" id="">
        </fieldset>
        <fieldset>
            <legend>Personal information</legend>
            <label for="age"><em>*</em>Age</label>
            <input id="age"><br>
            <label for="gender">Gender</label>
            <label id="gender"></label>
            <select id="gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select><br>
            <label for="comments">When did you first know you wanted to be zoo-keeper</label>
            <textarea id="comments" id=""></textarea>
        </fieldset>
    </form>
</body>
</html>
